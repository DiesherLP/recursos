<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Parroquia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 400px; margin-top: 100px; border-radius: 15px; }
        .btn-primary { background-color: #0d6efd; border: none; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card shadow login-card p-4">
            <div class="text-center mb-4">
                <h2 class="text-primary fw-bold">Iniciar Sesión</h2>
                <p class="text-muted">Sistema de Gestión Parroquial</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger py-2">
                <small>Usuario o contraseña incorrectos.</small>
            </div>

            <div th:if="${param.logout}" class="alert alert-success py-2">
                <small>Has cerrado sesión exitosamente.</small>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-bold">Usuario</label>
                    <input type="text" name="username" class="form-control" placeholder="Nombre de usuario" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="********" required>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary fw-bold">Entrar al Sistema</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
