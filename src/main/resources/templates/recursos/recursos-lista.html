<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Listado Parroquia - Tactic</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

    <style>
        .page-item.active .page-link { background-color: #0d6efd !important; border-color: #0d6efd !important; }
        .dataTables_wrapper .dataTables_filter input { 
            border: 2px solid #0d6efd !important; 
            border-radius: 5px; 
            width: 250px !important;
            margin-bottom: 10px;
        }
        .user-welcome { font-size: 0.9rem; color: #6c757d; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex justify-content-end mb-2 user-welcome" sec:authorize="isAuthenticated()">
            <span>Bienvenido, <strong class="text-primary" sec:authentication="name">Usuario</strong></span>
        </div>

        <div class="card shadow mb-4">
            <div class="card-header bg-white border-0">
                <div class="d-flex justify-content-between align-items-center py-2">
                    <img th:src="@{/images/logo.png}" alt="Logo" width="70" height="70">
                    <div class="text-center">
                        <h3 class="mb-0 text-primary fw-bold">PARROQUIA SANTA MARÍA DE LA ASUNCIÓN</h3>
                        <p class="text-muted mb-0">Gestión de Fichas de Confirmación</p>
                    </div>
                    <img th:src="@{/images/espiritu.png}" alt="Espíritu" width="70" height="70">
                </div>
                
                <div class="bg-primary p-2 d-flex justify-content-end align-items-center gap-2 mt-2 rounded shadow-sm">
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/recursos/nuevo}" class="btn btn-light btn-sm fw-bold">+ NUEVA FICHA</a>
                    
                    <a th:href="@{/recursos/creditos}" class="btn btn-light btn-sm fw-bold">CRÉDITOS</a>
                    
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-danger btn-sm fw-bold">
                            CERRAR SESIÓN
                        </button>
                    </form>
                </div>
            </div>

            <div class="card-body">
                <div class="table-responsive">
                    <table id="tablaFichas" class="table table-hover table-bordered w-100">
                        <thead class="table-dark text-center">
                            <tr>
                                <th>No.</th>
                                <th>FECHA REGISTRO</th>
                                <th>NOMBRE</th>
                                <th>EDAD</th>
                                <th>CATEQUISTA</th>
                                <th>ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item, stat : ${recursos}">
                                <td class="text-center fw-bold" th:text="${stat.count}"></td>
                                <td class="text-center" th:text="${item.fechaRegistro != null ? #temporals.format(item.fechaRegistro, 'dd/MM/yyyy') : '---'}"></td>
                                <td th:text="${item.nombre}"></td>
                                <td th:text="${item.edad}" class="text-center"></td>
                                <td th:text="${item.catequista}"></td>
                                <td class="text-center">
                                    <div class="btn-group">
                                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/recursos/editar/{id}(id=${item.id})}" class="btn btn-sm btn-info text-white">Editar</a>
                                        
                                        <a th:href="@{/recursos/imprimir/{id}(id=${item.id})}" class="btn btn-sm btn-secondary">Imprimir</a>
                                        
                                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/recursos/eliminar/{id}(id=${item.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar?')">Borrar</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        $(document).ready(function() {
            $('#tablaFichas').DataTable({
                pageLength: 10,
                language: {
                    search: "BUSCAR:",
                    lengthMenu: "Ver _MENU_ registros",
                    info: "Mostrando _START_ a _END_ de _TOTAL_",
                    paginate: { "next": "Sig.", "previous": "Ant." }
                }
            });
        });
    </script>
</body>
</html>
